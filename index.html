<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#111418">
    <link rel="manifest" href="manifest.json">
    <title>Heatmap de Notificaciones</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #0a0c10;
            margin: 0;
            padding: 12px;
            font-family: system-ui, sans-serif;
        }
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            background: #111418;
            border-radius: 28px;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #0a0e12 0%, #0f151c 100%);
            padding: 1rem;
            color: #eef2ff;
            border-bottom: 1px solid #2a2f38;
        }
        .header h1 {
            margin: 0;
            font-size: 1.2rem;
        }
        .upload-area {
            background: #0f1318;
            padding: 0.9rem;
            border-bottom: 1px solid #2a2f38;
        }
        .file-label {
            background: #ef4444;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            display: inline-block;
        }
        input[type="file"] { display: none; }
        .heatmap-wrapper {
            padding: 1rem;
            overflow-x: auto;
        }
        .heatmap-table {
            width: 100%;
            border-collapse: collapse;
            background: #0f1318;
            font-size: 0.8rem;
        }
        .heatmap-table th {
            background: #1a212c;
            color: #facc15;
            padding: 8px;
            border: 1px solid #2a2f38;
        }
        .heatmap-table td {
            border: 1px solid #2a2f38;
            text-align: center;
            padding: 8px;
        }
        .heatmap-table td:first-child {
            background: #1a212c;
            color: #facc15;
        }
        .heat-0 { background-color: #ffffff; color: #1f2937; }
        .heat-1 { background-color: #fee2e2; }
        .heat-2 { background-color: #fecaca; }
        .heat-3 { background-color: #fca5a5; }
        .heat-4 { background-color: #f87171; }
        .heat-5 { background-color: #ef4444; color: white; }
        .heat-6 { background-color: #dc2626; color: white; }
        .heat-7 { background-color: #b91c1c; color: white; }
        .heat-8 { background-color: #991b1b; color: white; }
        .heat-9 { background-color: #7f1d1d; color: white; }
        .heat-10 { background-color: #450a0a; color: white; }
        .no-data-msg {
            text-align: center;
            padding: 2rem;
            color: #9ca3af;
        }
        .error-message {
            background: #7f1d1d;
            color: #fee2e2;
            padding: 10px;
            margin: 12px;
            border-radius: 14px;
        }
    </style>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>🔥 Heatmap de Notificaciones</h1>
        </div>
        <div class="upload-area">
            <label class="file-label">
                📂 Subir Excel
                <input type="file" id="excelInput" accept=".xlsx, .xls, .xlsm">
            </label>
        </div>
        <div id="errorContainer"></div>
        <div class="heatmap-wrapper">
            <div id="heatmapRoot">
                <div class="no-data-msg">🌑 Sube tu archivo con columnas: diaSemana, horaNotificacion</div>
            </div>
        </div>
    </div>

    <script>
        let rawRegistros = [];
        let rangosDinamicos = [];
        const daysOrder = ["lunes", "martes", "miércoles", "jueves", "viernes", "sábado", "domingo"];

        function normalizarDia(diaRaw) {
            if (!diaRaw) return null;
            let dia = diaRaw.toString().trim().toLowerCase();
            dia = dia.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            if (dia === "lunes") return "lunes";
            if (dia === "martes") return "martes";
            if (dia === "miercoles") return "miércoles";
            if (dia === "jueves") return "jueves";
            if (dia === "viernes") return "viernes";
            if (dia === "sabado") return "sábado";
            if (dia === "domingo") return "domingo";
            return null;
        }

        function horaADecimal(horaRaw) {
            if (!horaRaw) return null;
            let horaStr = horaRaw.toString().trim();
            if (horaStr.toLowerCase() === "sin notificacion") return null;
            if (horaStr.includes(":")) {
                const partes = horaStr.split(":");
                let horas = parseInt(partes[0], 10);
                let minutos = parseInt(partes[1], 10);
                if (isNaN(horas)) return null;
                if (isNaN(minutos)) minutos = 0;
                return horas + (minutos / 60);
            }
            let num = parseFloat(horaStr);
            if (!isNaN(num) && num >= 0 && num <= 1) return num * 24;
            return null;
        }

        function formatearHora(horaDecimal) {
            const hora = Math.floor(horaDecimal);
            const minutos = Math.round((horaDecimal - hora) * 60);
            return `${hora.toString().padStart(2, '0')}:${minutos.toString().padStart(2, '0')}`;
        }

        function generarRangosDinamicos(horasUnicas) {
            if (horasUnicas.length === 0) return [];
            horasUnicas.sort((a, b) => a - b);
            let grupos = [];
            let grupoActual = [horasUnicas[0]];
            for (let i = 1; i < horasUnicas.length; i++) {
                if (horasUnicas[i] - horasUnicas[i - 1] <= 1.5) grupoActual.push(horasUnicas[i]);
                else { grupos.push([...grupoActual]); grupoActual = [horasUnicas[i]]; }
            }
            grupos.push([...grupoActual]);
            return grupos.map(g => ({
                min: Math.min(...g) - 0.01,
                max: Math.max(...g) + 0.01,
                label: `${formatearHora(Math.min(...g))} - ${formatearHora(Math.max(...g))}`
            }));
        }

        function obtenerRangoIndex(horaDecimal, rangos) {
            for (let i = 0; i < rangos.length; i++) {
                if (horaDecimal >= rangos[i].min && horaDecimal <= rangos[i].max) return i;
            }
            return null;
        }

        function procesarExcel(data) {
            const registros = [];
            const sheetName = data.SheetNames[0];
            const worksheet = data.Sheets[sheetName];
            const filas = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });
            if (!filas || filas.length < 2) throw new Error("El archivo está vacío");

            let colDia = -1, colHora = -1;
            
            for (let r = 0; r < Math.min(5, filas.length); r++) {
                const row = filas[r];
                if (!row) continue;
                for (let c = 0; c < row.length; c++) {
                    const val = row[c] ? row[c].toString().toLowerCase().trim() : "";
                    if ((val === "diasemana" || val === "dia semana") && colDia === -1) colDia = c;
                    if ((val === "horanotificacion" || val === "hora notificacion") && colHora === -1) colHora = c;
                }
            }

            if (colDia === -1) throw new Error("No se encontró columna 'diaSemana'");
            if (colHora === -1) throw new Error("No se encontró columna 'horaNotificacion'");

            for (let i = 1; i < filas.length; i++) {
                const row = filas[i];
                if (!row) continue;
                const dia = normalizarDia(row[colDia]);
                if (!dia) continue;
                const horaDec = horaADecimal(row[colHora]);
                if (horaDec === null) continue;
                registros.push({ dia, horaDecimal: horaDec });
            }
            
            if (registros.length === 0) throw new Error("No hay registros válidos");
            const horasUnicas = [...new Set(registros.map(r => r.horaDecimal))];
            const rangos = generarRangosDinamicos(horasUnicas);
            return { registros, rangos };
        }

        function renderizarHeatmap() {
            const conRango = rawRegistros.map(r => {
                const idx = obtenerRangoIndex(r.horaDecimal, rangosDinamicos);
                return idx !== null ? { ...r, rangoIdx: idx } : null;
            }).filter(r => r);

            const matriz = {};
            for (let i = 0; i < rangosDinamicos.length; i++) {
                matriz[i] = {};
                for (let d of daysOrder) matriz[i][d] = 0;
            }
            let total = 0;
            conRango.forEach(r => { matriz[r.rangoIdx][r.dia]++; total++; });

            let maxFreq = 0;
            for (let i = 0; i < rangosDinamicos.length; i++)
                for (let d of daysOrder) maxFreq = Math.max(maxFreq, matriz[i][d]);
            maxFreq = Math.max(maxFreq, 1);

            const container = document.getElementById("heatmapRoot");
            if (total === 0) {
                container.innerHTML = `<div class="no-data-msg">🔍 No hay notificaciones válidas</div>`;
                return;
            }

            let html = `<table class="heatmap-table"><thead><tr><th>✅ ${total}</th>`;
            for (let d of daysOrder) {
                html += `<th>${d.charAt(0).toUpperCase() + d.slice(1)}</th>`;
            }
            html += `</tr></thead><tbody>`;

            for (let r = 0; r < rangosDinamicos.length; r++) {
                const rango = rangosDinamicos[r];
                html += `<tr>`;
                html += `<td>🕐 ${rango.label}</td>`;
                for (let d of daysOrder) {
                    const freq = matriz[r][d];
                    const intensidad = Math.min(10, Math.floor((freq / maxFreq) * 10));
                    html += `<td class="heat-${intensidad}">${freq}</td>`;
                }
                html += `</tr>`;
            }
            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        function mostrarError(msg) {
            const errDiv = document.getElementById("errorContainer");
            errDiv.innerHTML = `<div class="error-message">⚠️ ${msg}</div>`;
        }

        function limpiarError() {
            document.getElementById("errorContainer").innerHTML = "";
        }

        document.getElementById("excelInput").addEventListener("change", function(e) {
            const file = e.target.files[0];
            if (!file) return;
            limpiarError();
            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const data = new Uint8Array(evt.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const { registros, rangos } = procesarExcel(wb);
                    rawRegistros = registros;
                    rangosDinamicos = rangos;
                    renderizarHeatmap();
                } catch (err) {
                    mostrarError(err.message);
                }
            };
            reader.onerror = () => mostrarError("No se pudo leer el archivo");
            reader.readAsArrayBuffer(file);
        });

        // Registrar Service Worker - Versión simplificada
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('✅ SW registrado'))
                .catch(err => console.log('❌ Error SW:', err));
        }
    </script>
</body>
</html>
